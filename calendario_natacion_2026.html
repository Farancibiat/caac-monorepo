
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.container { padding: 1rem 0; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.filter-btn { border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
.filter-btn:hover:not(.active) { background: var(--color-background-secondary); }
.count-bar { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 10px 8px; text-align: left; border-bottom: 0.5px solid var(--color-border-tertiary); }
tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); }
tbody tr:hover { background: var(--color-background-secondary); }
tbody td { padding: 9px 10px; vertical-align: top; color: var(--color-text-primary); line-height: 1.4; }
td.fecha { white-space: nowrap; font-size: 12px; color: var(--color-text-secondary); min-width: 90px; }
td.nombre { font-weight: 500; }
td.nombre a { color: var(--color-text-info); text-decoration: none; }
td.nombre a:hover { text-decoration: underline; }
td.loc { color: var(--color-text-secondary); font-size: 12px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.badge-aa { background: #E1F5EE; color: #0F6E56; }
.badge-pi { background: #E6F1FB; color: #185FA5; }
.badge-tri { background: #EEEDFE; color: #534AB7; }
.badge-ge { background: #FAECE7; color: #993C1D; }
.dist { font-size: 12px; color: var(--color-text-secondary); }
.nota { font-size: 11px; color: var(--color-text-warning); margin-top: 2px; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>

<h2 class="sr-only">Calendario de eventos de natación, aguas abiertas y triatlón 2026 — listado filtrable por tipo</h2>

  <button class="filter-btn" data-filter="pi">🏊 Piscina</button>
  <button class="filter-btn" data-filter="tri">🚴 Triatlón</button>
  <button class="filter-btn" data-filter="ge">🧊 Aguas Gélidas</button>
</div>
<div class="count-bar" id="count-bar">Mostrando <strong id="count">30</strong> eventos</div>
<table>

      <th>Nombre del Evento</th>
      <th>Ubicación</th>
      <th>Tipo</th>

  <tbody id="tbody"></tbody>
</table>
</div>

const badgeClass = { aa:"badge-aa", pi:"badge-pi", tri:"badge-tri", ge:"badge-ge" };
const tbody = document.getElementById("tbody");
const countEl = document.getElementById("count");
let current = "all";

function render(filter){
  const filtered = filter==="all" ? eventos : eventos.filter(e=>e.tipo===filter);
  countEl.textContent = filtered.length;
  tbody.innerHTML = filtered.map(e=>`
    <tr data-tipo="${e.tipo}">
      <td class="fecha">${e.fecha}</td>
      <td class="nombre">
        ${e.link ? `<a href="${e.link}" target="_blank">${e.nombre}</a>` : e.nombre}
        ${e.nota ? `<div class="nota">${e.nota}</div>` : ""}
      </td>
      <td class="loc">${e.loc}</td>
      <td><span class="badge ${badgeClass[e.tipo]}">${e.badge}</span></td>
      <td class="dist">${e.dist}</td>
    </tr>`).join("");
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    current = btn.dataset.filter;
    render(current);
  });
});

render("all");
